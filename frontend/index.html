<html>

<head>
    <title>Aura</title>
    <link rel="stylesheet" href="/static/index.css">
    <script type="importmap">
    { "imports":
        {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js/+esm",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
        "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.5/modules/talkinghead.mjs",
        "transformer": "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.7.2/dist/transformers.min.js"
        }
    }
  </script>
    <script src="/static/modules/animator.js" type="module"></script>
    <script src="/static/modules/communicator.js" type="module"></script>
    <script src="/static/index.js" type="module"></script>
</head>


<body>
    <!-- loading -->
    <div id="aura-loading">
        <div class="aura-ring"></div>
    </div>

    <!-- avatar -->
    <div id="avatar"></div>

    <!-- debug -->
    <button id="chat-toggle">Debug</button>
    <div id="chat-panel">
        <div id="chat-messages"></div>
    </div>

    <!-- controls -->
    <div id="controls">
        <button id="dial">Dial</button>
        <button id="drop" hidden>Drop</button>
    </div>
</body>

</html>
